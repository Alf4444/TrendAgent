name: ETF Alert

on:
  schedule:
    # Mandag, onsdag, fredag kl. 08:00 DK (06:00 UTC)
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          pip install yfinance jinja2
          pip install git+https://github.com/druzsan/justetf-scraping.git -q

      - name: Fetch fresh ETF data
        run: python reporting/etf_provider.py

      - name: Run Spejder screening
        run: python reporting/etf_spejder.py

      - name: Send ETF Alert
        run: python reporting/etf_send_alert.py
        env:
          MAIL_USERNAME:   ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:   ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECIPIENTS: ${{ secrets.MAIL_RECIPIENTS }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/etf_latest.json data/etf_history.json data/etf_hwm.json
          git add data/etf_spejder_hits.json 2>/dev/null || true
          git add data/etf_spejder_prev.json 2>/dev/null || true
          git commit -m "ETF Alert + Spejder opdateret [skip ci]" || echo "Ingen ændringer"
          git pull --rebase origin main
          git push
