name: ETF Nordnet Inventory Sync

on:
  workflow_dispatch: # Giver dig "Run workflow" knappen
  schedule:
    - cron: '0 0 1 * *' # Kører den 1. i hver måned

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optimizer hastigheden til næste gang

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Nordnet Sync
        run: python reporting/etf_nordnet_inventory.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "TrendAgent Bot"
          git config --global user.email "bot@trendagent.ai"
          git add data/etf_nordnet_inventory.json
          # Vi tjekker om der rent faktisk er ændringer før vi committer
          if git diff --staged --quiet; then
            echo "Ingen ændringer fundet i Nordnet listen."
          else
            git commit -m "🤖 Auto-update: Nordnet Inventory [skip ci]"
            git push
          fi
