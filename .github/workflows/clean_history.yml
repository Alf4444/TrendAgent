name: Clean History (Kør én gang)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (true = vis kun, false = slet forkerte kurser)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kør clean_history.py
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN — ingen ændringer gemmes ==="
            python reporting/clean_history.py --dry-run
          else
            echo "=== RENSNING — sletter forkerte kurser ==="
            python reporting/clean_history.py
          fi

      - name: Gem renset history.json
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/history.json
          git commit -m "Rens: Fjerner forkerte kurser fra history.json [skip ci]" || echo "Ingen ændringer"
          git push
