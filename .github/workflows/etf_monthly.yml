name: ETF Monthly Report

on:
  schedule:
    # Lørdag kl. 07:30 DK (05:30 UTC) — 30 min efter weekly
    - cron: '30 5 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          pip install yfinance
          pip install jinja2

      - name: Fetch fresh ETF data
        run: python reporting/etf_provider.py

      - name: Build Monthly Report
        run: python reporting/etf_build_monthly.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/etf_latest.json data/etf_history.json data/etf_hwm.json build/etf_monthly.html data/portfolio_hwm.json
          git commit -m "ETF Monthly rapport opdateret [skip ci]" || echo "Ingen ændringer at committe"
          git pull --rebase origin main
          git push
