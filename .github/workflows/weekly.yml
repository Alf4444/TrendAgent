name: Weekly Report

on:
  workflow_dispatch: {}
  schedule:
    # Kører hver lørdag kl. 07:00 (06:00 UTC)
    - cron: "0 6 * * 6"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install jinja2  # Sikrer at jinja2 altid er der
          
      - name: Reparer historik (Backfill)
        run: |
          python data/backfill_data.py

      - name: Build Weekly Report
        run: |
          python reporting/build_weekly_report.py
        
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Vi tilføjer alt relevant: Rapport, Historik og Latest data
          git add build/weekly.html data/history.json data/latest.json
          git commit -m "Manual build: Weekly report updated [skip ci]" || echo "Ingen ændringer at committe"
          git push
